services:
  - type: web
    name: se7enurl
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: SERVER_PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false # Paste your PostgreSQL URL here during setup
      - key: REDIS_HOST
        sync: false # You will enter this securely in the Render dashboard
      - key: REDIS_PORT
        sync: false
      - key: REDIS_USERNAME
        sync: false
      - key: REDIS_PASSWORD
        sync: false
